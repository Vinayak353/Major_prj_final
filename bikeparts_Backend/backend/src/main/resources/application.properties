# Server
server.port=8080

# Database – override with environment variables in production
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/motoparts}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:ThisIsAVeryLongSecretKeyThatShouldBeChangedInProductionMin256Bits}
jwt.expiration=86400000

## Razorpay
#razorpay.key.id=${RAZORPAY_KEY_ID:YOUR_RAZORPAY_KEY_ID}
